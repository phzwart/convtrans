model:
  name: basic_unet_instance
  in_channels: 1
  num_classes: 2
  base_channels: 16
  channel_multipliers: [1, 2, 4, 8]
  encoder_depths: [1, 1, 1, 1]
  decoder_depths: [1, 1, 1]
  norm: batchnorm
  act: gelu
  use_raw_skips: true
  bottleneck_depth: 1

  trunk:
    type: basic_unet

  instance_head:
    shared_dim: 32
    shared_depth: 1
    branch_depth: 1

targets:
  center:
    sigma: 2.0
    radius: 4

postprocess:
  foreground_threshold: 0.5
  center_threshold: 0.3
  nms_kernel_size: 5
  max_assignment_distance: 12.0
  min_instance_area: 4

training:
  image_size: 96
