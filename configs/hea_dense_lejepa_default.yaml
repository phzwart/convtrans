model:
  name: hea_dense_lejepa
  in_channels: 1
  num_classes: 1
  base_channels: 16
  channel_multipliers: [1, 2, 4, 8]
  encoder_depths: [1, 1, 1, 1]
  decoder_depths: [1, 1, 1]
  norm: batchnorm
  act: gelu
  use_raw_skips: false

  backbone:
    type: hea_backbone
    hea_enabled: true
    hea_enabled_decoder_stages: [0]
    elevator_mode: direct
    fusion_mode: per_scale
    operator_backend: optimized

  attention:
    heads: 2
    head_dim: 8
    qkv_bias: true
    out_bias: true

  semantic_memory:
    enabled_scales: [1, 2, 3]
    block_depths: [1, 1, 1]
    window_sizes: [3, 3, 5]
    dilations: [1, 1, 2]

  hea:
    enabled_decoder_stages: [0]
    per_scale_window_sizes: [3, 3, 5]
    per_scale_dilations: [1, 1, 2]
    fusion: gated_residual

  latent:
    source: top
    latent_dim: 64
    projector_depth: 1
    normalize_latents: false

  lejepa:
    num_views: 4
    lambda_sigreg: 0.02
    invariance:
      loss_type: mse
      loss_on_valid_only: false
    sigreg:
      enabled: true
      num_slices: 64
      num_knots: 17
      t_max: 3.0
      per_view: true
    views:
      mode: aligned_same_geometry
      same_geometry: true
      shared_crop_ratio: 0.875
      corruption:
        intensity_jitter: true
        blur: true
      gaussian_noise: true
      random_block_mask: false
      block_mask_ratio: 0.0
      block_mask_num_blocks: 1

training:
  image_size: 128
