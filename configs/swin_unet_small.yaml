model:
  name: swin_unet
  in_channels: 3
  num_classes: 1
  base_channels: 16
  channel_multipliers: [1, 2, 4, 8]
  encoder_depths: [1, 1, 1, 1]
  decoder_depths: [1, 1, 1]
  norm: batchnorm
  act: gelu
  use_raw_skips: true
  patch_size: 3
  mlp_ratio: 4.0
  swin_window_size: 7
  swin_stage_heads: [2, 4, 8, 8]
  bottleneck_depth: 1
  attention:
    qkv_bias: true

training:
  image_size: 128
