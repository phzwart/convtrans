model:
  name: hea_unet_instance
  in_channels: 1
  num_classes: 2
  base_channels: 16
  channel_multipliers: [1, 2, 4, 8]
  encoder_depths: [1, 1, 1, 1]
  decoder_depths: [1, 1, 1]
  norm: batchnorm
  act: gelu
  use_raw_skips: false
  bottleneck_depth: 1
  bottleneck_window_size: 5
  bottleneck_dilation: 1

  trunk:
    type: hea_unet
    hea_enabled: true
    hea_enabled_decoder_stages: [0]
    elevator_mode: direct
    fusion_mode: per_scale
    operator_backend: optimized

  attention:
    heads: 4
    head_dim: 8
    qkv_bias: true
    out_bias: true

  semantic_memory:
    enabled_scales: [1, 2, 3]
    block_depths: [1, 1, 1]
    window_sizes: [3, 3, 5]
    dilations: [1, 1, 2]
    use_local_transformer_block: true

  hea:
    enabled_decoder_stages: [0]
    per_scale_window_sizes: [3, 3, 5]
    per_scale_dilations: [1, 1, 2]
    fusion: gated_residual
    joint_scale_projection: true

  instance_head:
    shared_dim: 32
    shared_depth: 1
    branch_depth: 1
    foreground_channels: 1
    center_channels: 1
    offset_channels: 2
    boundary_branch: false
    semantic_branch: false

targets:
  center:
    mode: gaussian
    sigma: 3.0
    radius: 5
  offsets:
    normalize: false

loss:
  foreground:
    type: bce
    weight: 1.0
  center:
    type: mse
    weight: 1.0
  offset:
    type: l1
    weight: 1.0

postprocess:
  foreground_threshold: 0.5
  center_threshold: 0.3
  nms_kernel_size: 5
  max_assignment_distance: 20.0
  min_instance_area: 8

training:
  image_size: 128
